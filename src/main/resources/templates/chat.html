<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time-Chat Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h1 class="text-center">Real-Time Chat Application</h1>
    <div id="chat"
         class="border rounded p-3 mb-3"
         style="height: 300px; overflow-y: auto;">
    </div>
    <div class="input-group mb-3">
        <input id="senderInput" type="text" class="form-control"
               placeholder="Your name....."/>
    </div>
    <div class="input-group mb-3">
        <input id="messageInput" type="text" class="form-control"
               placeholder="Type a message....."/>
        <div class="input-group-append">
            <button id="sendMessage" class="btn btn-primary">Send</button>
        </div>
    </div>

</div>
</body>
<script>
    var stompClient = null;
    function setConnected(connected){
     document.getElementById('sendMessage').disabled = !connected;
    }

    function connect(){
     //SEND JOIN MESSAGE HERE
     var sender = document.getElementById('senderInput').value.trim();
     if(sender === ""){
     alert("Enter your name first");
     return;
     }
      var socket = new SockJS('/chat');
    stompClient = Stomp.over(socket);

    stompClient.connect({}, function(frame) {

     setConnected(true);

     stompClient.subscribe('/topic/messages', function (message) {
     showMessage(JSON.parse(message.body));
     });

     var joinMessage = {
     sender: sender,
     content: sender + " joined the chat",
     type: "JOIN"
     };
     stompClient.send("/app/sendMessage", {}, JSON.stringify(joinMessage));
    });
    }

    function showMessage(message){
    console.log("Full message:",message);
    console.log("Sender:",message.sender);
    console.log("Content:",message.content);

     var chat = document.getElementById('chat');
     var messageElement = document.createElement('div');

    var time = new Date(message.timestamp);
     var formattedTime = time.toLocaleTimeString([],{hour: '2-digit', minute:'2-digit'});
       var currentUser = document.getElementById('senderInput').value;

       if(message.type === "JOIN"){
        messageElement.style.color = "orange";
        messageElement.textContent = message.sender + " joined the chat";
        }
        else {
      if(message.sender === currentUser){
        messageElement.style.color = "green";
        } else{
         messageElement.style.color = "blue";
         }
     messageElement.textContent = message.sender + " : " + message.content + " (" + formattedTime + ")";
     }
     messageElement.className = "border-bottom mb-1";
     chat.appendChild(messageElement);
     chat.scrollTop = chat.scrollHeight;
     }

     function sendMessage(){
      if(!stompClient){
         connect();
         return;
         }
      var sender = document.getElementById('senderInput').value.trim();
      var content = document.getElementById('messageInput').value.trim();
      if(content === "") return;
      var chatMessage = {
            sender: sender,
            content: content,
             type: "CHAT"
            };
            stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));
            document.getElementById('messageInput').value = "";
        }
    document.getElementById('sendMessage').onclick = sendMessage;

    //PAGE LOADING
     function loadMessage(){
    var chat = document.getElementById('chat');
    chat.innerHTML = "";
      fetch("/messages")
     .then(response => response.json())
     .then(data => {

      data.forEach(message => {
      if(message.type !== "JOIN"){
       showMessage(message);
       }
    });
    });
    }
    window.onload = function(){
     connect();
    };
</script>
</html>
